name: Обновление платин

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости
        run: pip install requests

      - name: Скачать обложки из PS Store
        run: python download_covers.py

      - name: Обновить index.html
        run: python generator.py
     
      - name: Запушить
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop || true
          git add index.html data.json covers/
          git diff --staged --quiet || (git commit -m "Автообновление" && git push)
