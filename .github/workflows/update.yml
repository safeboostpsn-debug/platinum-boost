name: Update Site

on:
  # Запуск при пуше в ветку main
  push:
    branches:
      - main
    # Запускать только при изменении важных файлов
    paths:
      - 'data.json'
      - 'proofs/**'
      - 'generator.py'
  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:
  # Регулярный запуск, например, раз в день (опционально)
  schedule:
    - cron: '0 0 * * *' # каждый день в 00:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Запускаем генератор
      - name: Run generator
        run: python generator.py

      # 5. Отправляем изменения обратно в репозиторий
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Auto-update index.html" || echo "No changes to commit"
          git push
