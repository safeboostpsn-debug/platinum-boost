name: Обновление галереи платин

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости
        run: pip install requests beautifulsoup4

      - name: Запустить скрипт обновления
        run: python update_gallery.py

      - name: Загрузить изменения обратно
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html update_log.txt
          git diff --staged --quiet || git commit -m "Автообновление галереи платин"
          git push
